<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5b0"/>
      <stop offset="100%" stop-color="#00aade"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- "C" shape formed by 5 tiles: top row, left-mid, bottom row (right tile missing = open C) -->

  <!-- Top-left tile -->
  <rect x="7"  y="7"  width="20" height="15" rx="3.5" fill="url(#g1)" opacity="0.95" filter="url(#glow)"/>
  <!-- Top-right tile -->
  <rect x="31" y="7"  width="20" height="15" rx="3.5" fill="url(#g2)" opacity="0.95" filter="url(#glow)"/>

  <!-- Middle-left tile (the spine of the C) -->
  <rect x="7"  y="25" width="20" height="14" rx="3.5" fill="url(#g1)" opacity="0.80"/>

  <!-- Bottom-left tile -->
  <rect x="7"  y="42" width="20" height="15" rx="3.5" fill="url(#g2)" opacity="0.95" filter="url(#glow)"/>
  <!-- Bottom-right tile -->
  <rect x="31" y="42" width="20" height="15" rx="3.5" fill="url(#g1)" opacity="0.95" filter="url(#glow)"/>

  <!-- Subtle network dots -->
  <circle cx="17" cy="14.5" r="3"   fill="white" opacity="0.35"/>
  <circle cx="41" cy="14.5" r="2.2" fill="white" opacity="0.30"/>
  <circle cx="17" cy="32"   r="2.2" fill="white" opacity="0.25"/>
  <circle cx="17" cy="49.5" r="3"   fill="white" opacity="0.35"/>
  <circle cx="41" cy="49.5" r="2.2" fill="white" opacity="0.30"/>

  <!-- Connecting pulse lines -->
  <line x1="27" y1="14.5" x2="31" y2="14.5" stroke="white" stroke-width="1.2" opacity="0.20"/>
  <line x1="27" y1="49.5" x2="31" y2="49.5" stroke="white" stroke-width="1.2" opacity="0.20"/>
  <line x1="17" y1="22"   x2="17" y2="25"   stroke="white" stroke-width="1.2" opacity="0.15"/>
  <line x1="17" y1="39"   x2="17" y2="42"   stroke="white" stroke-width="1.2" opacity="0.15"/>
</svg>
